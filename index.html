<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ivan Chulde"/>
    <meta name="description" content="ECU 911 Ambato Vehicle Application Access Control" />
    <title>PokéExplorer</title>
    <link rel="stylesheet" href="src/css/style.css">
    
</head>
<body>
  <header>
    <div class="header-top">
      <img src="src/images/pokemon.png" alt="Pokemon Logo">
      <span>PokéExplorer</span>
    </div>

    <nav class="navbar">
      <div class="nav-buttons">
        <button id="homeBtn">Search</button>
        <button id="mapBtn">Capture</button>
        <button id="favBtn">My Pokédex</button>
      </div>
    </nav>

  </header>

  <main>
    <!-- SEARCH -->
    <section id="homeSection">
      <section class="search">
        <input type="text" id="searchInput" placeholder="Enter Pokémon name..." />
        <button id="searchBtn">Search</button>
      </section>

      <section id="result"></section>
    </section>

    <!-- CAPTURE -->
    <section id="mapSection" style="display:none;">
      <h2>Capture Pokémon</h2>
      <div id="mapContainer" class="map-grid">
        <div class="zone" data-zone="Quito">Quito</div>
        <div class="zone" data-zone="Guayaquil">Guayaquil</div>
        <div class="zone" data-zone="Cuenca">Cuenca</div>
        <div class="zone" data-zone="Ambato">Ambato</div>
        <div class="zone" data-zone="Loja">Loja</div>
        <div class="zone" data-zone="Manta">Manta</div>
      </div>

      <div id="captureResult"></div>
    </section>


    <!-- FAVORITES -->
    <section id="favSection" style="display:none;">
      <h2>My Pokédex</h2>
      <div id="favoritesContainer"></div>
    </section>
      
  </main>

  <footer class="modern-footer">
      <div class="footer-bottom">
          <p>&copy; <span id="current-year"></span> Ivan Chulde | Ambato-Ecuador.</p>
          <p>Last Modified in: <span id="lastModified"></span></p>
      </div>
  </footer>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span id="closeModal">&times;</span>
      <div id="modalBody"></div>
    </div>
  </div>

  <script type="module" src="src/js/main.js"></script>

</body>
</html>
